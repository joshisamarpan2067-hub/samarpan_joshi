<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AVN Project Cover - Full Page</title>
    <style>
        /* Forces the printer to recognize the full A4 size */
        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: light gray; /* Dark background to see the white page clearly */
            display: flex;
            justify-content: center;
            font-family: "Courier New", Courier, monospace;
        }

        .page {
            background-color: white;
            width: 210mm;
            height: 297mm;
            padding: 10mm; /* Internal padding */
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            margin: 20px 0; /* Space for viewing in browser */
        }

        /* The Double Border Inner Box */
        .border-box {
            width: 100%;
            height: 100%;
            border: 2px solid black;
            outline: 6px double black;
            outline-offset: -12px;
            box-sizing: border-box;
            position: relative;
            padding: 40px;
        }

        h1 {
            text-align: center;
            font-size: 30pt;
            margin-top: 20px;
            font-weight: bold;
        }

        .logo-container {
            text-align: center;
            margin: 30px auto;
        }

        .logo-container img {
            max-width: 220px;
            height: auto;
        }

        .project-title {
            text-align: center;
            font-size: 40pt;
            font-family: "Times New Roman", Times, serif;
            font-weight: bold;
            margin: 20px 0;
        }

        .details-section {
            margin-top: 40px;
            margin-left: 40px;
            font-family: 'Brush Script MT', 'Lucida Handwriting', cursive;
            font-size: 24pt;
            line-height: 2.2;
        }

        .field {
            display: flex;
            align-items: baseline;
        }

        .line {
            flex-grow: 1;
            border-bottom: 2px solid black;
            margin-left: 10px;
            margin-right: 40px;
        }

        /* The "Little Bottom" Positioning */
        .approval-section {
            position: absolute;
            bottom: 40px; 
            left: 50px;
            font-family: 'Brush Script MT', 'Lucida Handwriting', cursive;
            font-size: 22pt;
        }

        .approval-line {
            display: inline-block;
            border-bottom: 2px solid black;
            width: 200px;
            margin-left: 1o0px;
        }

        /* Critical for Printing */
        @media print {
            body { background: none; margin: 0; }
            .page { 
                margin: 0; 
                box-shadow: none; 
                width: 210mm;
                height: 297mm;
            }
        }
    </style>
</head>
<body>

    <div class="page">
        <div class="border-box">
            <h1>Aishwarya Vidya Niketan</h1>

            <div class="logo-container">
                <img src="C:\Users\mp\Desktop\Index\AVN logo.jpg" alt="AVN School Logo">
            </div>

            <div class="project-title">Project Work</div>

            <div class="details-section">
                <div class="field">Submitted By: <span class="line"></span></div>
                <div class="field">Class: <span class="line"></span></div>
                <div class="field">Roll No: <span class="line"></span></div>
                <div class="field">Addressed to: <span class="line"></span></div>
            </div>

            <div class="approval-section">
                Teacher's Approval: <span class="approval-line"></span>
            </div>
        </div>
    </div>

</body>
</html>
